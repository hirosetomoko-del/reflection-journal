<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reflection Journal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rounded+Mplus+1c:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f7fb;
  --surface:#ffffff;
  --surface-soft:#f1f4f9;
  --text:#1e293b;
  --text-muted:#64748b;
  --accent:#2563eb;
  --border:#d1d8e4;
  --shadow:0 4px 12px rgba(15,23,42,.08);
  --font-sans:'Rounded Mplus 1c',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --font-serif:'Noto Serif JP',serif;
  --font-mono:'Rounded Mplus 1c',menlo,monospace;
}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);overflow:hidden;display:flex;}
::selection{background:rgba(37,99,235,0.18);}
button,input,textarea{font-family:var(--font-mono);}

/* 認証画面 */
#authScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:24px;}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px 36px;max-width:360px;width:100%;box-shadow:var(--shadow);}
.auth-brand{font-size:11px;letter-spacing:0.2em;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:8px;text-transform:uppercase;}
.auth-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px;}
.auth-sub{font-size:13px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:22px;line-height:1.6;}
.auth-tabs{display:flex;gap:0;margin-bottom:18px;border-bottom:1px solid var(--border);}
.auth-tab{flex:1;padding:8px;font-family:var(--font-mono);font-size:12px;color:var(--text-muted);background:transparent;border:none;cursor:pointer;letter-spacing:0.08em;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.auth-field{margin-bottom:14px;}
.auth-label{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);letter-spacing:0.1em;display:block;margin-bottom:6px;}
.auth-input{width:100%;background:var(--surface-soft);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:var(--font-mono);font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.auth-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(37,99,235,0.15);}
.auth-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px;font-family:var(--font-mono);font-size:13px;letter-spacing:0.1em;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 8px 16px rgba(37,99,235,0.32);}
.auth-error,.auth-success{font-size:12px;font-family:var(--font-mono);border-radius:8px;padding:10px 12px;margin-bottom:12px;display:none;line-height:1.6;}
.auth-error{color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;}
.auth-success{color:#047857;background:#ecfdf5;border:1px solid #a7f3d0;}

/* メインUI */
#appScreen{display:none;width:100%;height:100vh;overflow:hidden;flex-direction:row;}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;flex-shrink:0;}
.sidebar-header{padding:16px 16px 10px;border-bottom:1px solid var(--border);}
.brand{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:2px;}
.brand-title{font-size:16px;font-weight:700;color:var(--text);}
.user-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.user-email{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px;}
.logout-btn{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 6px;cursor:pointer;transition:all 0.2s;}
.logout-btn:hover{color:var(--accent);border-color:var(--accent);}
.new-btn{margin:10px 14px 8px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 12px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.1em;cursor:pointer;width:calc(100% - 28px);transition:transform 0.2s,box-shadow 0.2s;display:flex;align-items:center;gap:6px;}
.new-btn:hover{transform:translateY(-1px);box-shadow:0 8px 16px rgba(37,99,235,0.25);}
.search-wrap{position:relative;padding:0 14px 8px;}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-muted);pointer-events:none;}
.search-input{width:100%;background:var(--surface-soft);border:1px solid var(--border);border-radius:8px;padding:7px 10px 7px 28px;font-family:var(--font-mono);font-size:12px;color:var(--text);outline:none;}
.search-input::placeholder{color:var(--text-muted);}
.filter-section{padding:0 14px 4px;}
.filter-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:5px;display:block;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.filter-chip{font-size:10px;font-family:var(--font-mono);padding:4px 9px;border-radius:999px;border:1px solid var(--border);background:var(--surface-soft);color:var(--text-muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.filter-chip:hover{border-color:var(--accent);color:var(--text);} 
.filter-chip.active{background:rgba(37,99,235,0.1);border-color:var(--accent);color:var(--accent);}
.date-row{display:flex;gap:6px;margin-bottom:6px;}
.date-input{flex:1;background:var(--surface-soft);border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-family:var(--font-mono);font-size:11px;color:var(--text);outline:none;}
.divider{height:1px;background:var(--border);margin:6px 14px;}
.entries-label{padding:8px 14px 4px;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);font-family:var(--font-mono);display:flex;justify-content:space-between;align-items:center;}
.entries-count{font-size:10px;font-family:var(--font-mono);color:var(--text-muted);}
.entry-list{flex:1;overflow-y:auto;padding-bottom:12px;}
.entry-list::-webkit-scrollbar{width:5px;}
.entry-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.entry-item{padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:background 0.2s,border-left-color 0.2s;}
.entry-item:hover{background:var(--surface-soft);}
.entry-item.active{border-left-color:var(--accent);background:rgba(37,99,235,0.05);}
.entry-date{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:2px;}
.entry-title{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;}
.entry-preview{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.entry-tag-pill{font-size:9.5px;font-family:var(--font-mono);color:var(--accent);background:rgba(37,99,235,0.12);padding:2px 6px;border-radius:999px;}
.no-results{padding:24px 14px;text-align:center;color:var(--text-muted);font-size:12px;font-family:var(--font-mono);line-height:1.8;}
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--surface-soft);}
.editor-header{padding:14px 30px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.editor-date-display{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);}
.editor-actions{display:flex;gap:8px;align-items:center;}
.mood-picker{display:flex;gap:5px;}
.mood-dot{width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(143,167,205,.5);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;background:rgba(18,30,53,0.84);}
.mood-dot:hover{transform:scale(1.15);}
.mood-dot.selected{border-color:var(--accent);box-shadow:0 0 12px rgba(88,181,255,0.45);transform:scale(1.2);}
.save-indicator{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);}
.save-indicator.saved{color:#76d8ff;}
.editor-scroll{flex:1;overflow-y:auto;padding:26px 34px 56px;background:linear-gradient(180deg,rgba(20,32,57,0.95),rgba(15,26,46,0.95));}
.editor-scroll::-webkit-scrollbar{width:6px;}
.editor-scroll::-webkit-scrollbar-thumb{background:rgba(90,121,164,0.6);border-radius:3px;}
.title-input{width:100%;border:none;background:transparent;font-family:var(--font-serif);font-size:26px;font-weight:700;color:#f1f8ff;outline:none;line-height:1.3;margin-bottom:8px;resize:none;}
.title-input::placeholder{color:var(--text-muted);}
.divider-line{width:48px;height:2px;background:var(--accent);margin:8px 0 18px;border-radius:2px;}
.body-input{width:100%;border:none;background:transparent;font-family:var(--font-serif);font-size:16px;color:#e7edf8;outline:none;line-height:2.0;resize:none;min-height:340px;}
.body-input::placeholder{color:var(--text-muted);}
.tag-area{padding:12px 36px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border);flex-shrink:0;}
.tag-label{font-size:11px;font-family:var(--font-mono);color:var(--text-faint);letter-spacing:0.12em;}
.tag{font-size:11px;font-family:var(--font-mono);color:#93c7ff;background:rgba(29,44,69,0.82);padding:4px 10px;border-radius:6px;border:1px solid rgba(88,181,255,0.3);cursor:pointer;transition:background 0.2s;}
.tag:hover{background:rgba(42,63,94,0.92);}
.tag-add{font-size:11px;font-family:var(--font-mono);color:var(--text-muted);background:transparent;border:1px dashed var(--text-faint);padding:4px 10px;border-radius:6px;cursor:pointer;outline:none;transition:color 0.2s,border-color 0.2s;}
.tag-add:focus,.tag-add:hover{color:#ffffff;border-color:var(--accent);}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-faint);}
.empty-icon{font-size:40px;opacity:0.35;}
.empty-text{font-size:13px;font-family:var(--font-mono);letter-spacing:0.1em;}
mark{background:rgba(88,181,255,0.2);color:inherit;border-radius:3px;padding:0 2px;}
</style>
</head>
<body>

<!-- 認証画面 -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-brand">private</div>
    <div class="auth-title">Reflection Journal</div>
    <div class="auth-sub">自分だけの振り返りノート</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">ログイン</button>
      <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">新規登録</button>
    </div>

    <div id="authError" class="auth-error"></div>
    <div id="authSuccess" class="auth-success"></div>

    <div class="auth-field">
      <label class="auth-label">メールアドレス</label>
      <input class="auth-input" type="email" id="emailInput" placeholder="your@email.com" />
    </div>
    <div class="auth-field">
      <label class="auth-label">パスワード</label>
      <input class="auth-input" type="password" id="passwordInput" placeholder="8文字以上" onkeydown="if(event.key==='Enter')submitAuth()" />
    </div>

    <button class="auth-btn" onclick="submitAuth()" id="authBtn">ログイン</button>
  </div>
</div>

<!-- メインUI -->
<div id="appScreen">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="brand">private</div>
      <div class="brand-title">Reflection Journal</div>
      <div class="user-row">
        <span class="user-email" id="userEmail"></span>
        <button class="logout-btn" onclick="logout()">ログアウト</button>
      </div>
    </div>

    <button class="new-btn" onclick="newEntry()">
      <span style="font-size:14px;">✦</span> 新しい記録
    </button>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="searchInput" placeholder="キーワードで検索..." oninput="applyFilters()" style="padding-left:26px;" />
    </div>

    <div class="filter-section">
      <span class="filter-label">気分</span>
      <div class="filter-bar" id="moodFilter">
        <button class="filter-chip" data-mood="☀️" onclick="toggleMoodFilter(this)">☀️</button>
        <button class="filter-chip" data-mood="🌿" onclick="toggleMoodFilter(this)">🌿</button>
        <button class="filter-chip" data-mood="🌙" onclick="toggleMoodFilter(this)">🌙</button>
        <button class="filter-chip" data-mood="🌧️" onclick="toggleMoodFilter(this)">🌧️</button>
        <button class="filter-chip" data-mood="🔥" onclick="toggleMoodFilter(this)">🔥</button>
      </div>
    </div>

    <div class="filter-section">
      <span class="filter-label">期間</span>
      <div class="date-row">
        <input class="date-input" type="date" id="dateFrom" onchange="applyFilters()" />
        <input class="date-input" type="date" id="dateTo" onchange="applyFilters()" />
      </div>
    </div>

    <div class="filter-section">
      <span class="filter-label">タグ</span>
      <div class="filter-bar" id="tagFilter"></div>
    </div>

    <div class="divider"></div>
    <div class="entries-label">
      <span>記録一覧</span>
      <span class="entries-count" id="entriesCount"></span>
    </div>
    <div class="entry-list" id="entryList"></div>
  </div>

  <div class="main">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✦</div>
      <div class="empty-text">記録を選択するか、新しく作成してください</div>
    </div>
    <div id="editorArea" style="display:none;flex-direction:column;height:100vh;overflow:hidden;">
      <div class="editor-header">
        <div class="editor-date-display" id="editorDateDisplay"></div>
        <div class="editor-actions">
          <div class="mood-picker">
            <button class="mood-dot" onclick="setMood(0,'☀️')">☀️</button>
            <button class="mood-dot" onclick="setMood(1,'🌿')">🌿</button>
            <button class="mood-dot" onclick="setMood(2,'🌙')">🌙</button>
            <button class="mood-dot" onclick="setMood(3,'🌧️')">🌧️</button>
            <button class="mood-dot" onclick="setMood(4,'🔥')">🔥</button>
          </div>
          <div class="save-indicator" id="saveIndicator">下書き</div>
        </div>
      </div>
      <div class="editor-scroll">
        <textarea class="title-input" id="titleInput" rows="1" placeholder="タイトル..." oninput="autoResize(this);onEdit();"></textarea>
        <div class="divider-line"></div>
        <textarea class="body-input" id="bodyInput" placeholder="今日の気づきや思いを書いてみてください..." oninput="autoResize(this);onEdit();"></textarea>
      </div>
      <div class="tag-area">
        <span class="tag-label">タグ :</span>
        <div id="tagList"></div>
        <input class="tag-add" id="tagInput" placeholder="+ タグを追加" onkeydown="handleTagInput(event)" />
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://rjcdsvejdhgaqvbvxrhn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqY2RzdmVqZGhnYXF2YnZ4cmhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMTk1ODMsImV4cCI6MjA5MDY5NTU4M30.NPGCdLgBVVehtLcr5Y4SkQaByzO9bScf-r4CKIT_xwA';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let entries = [];
let activeId = null;
let saveTimer = null;
let activeMoodFilters = new Set();
let activeTagFilters = new Set();
let currentTab = 'login';

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { currentUser = session.user; showApp(); }
  sb.auth.onAuthStateChange((_e, session) => {
    if (session) { currentUser = session.user; showApp(); }
    else { currentUser = null; showAuthScreen(); }
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  document.getElementById('authBtn').textContent = tab === 'login' ? 'ログイン' : 'アカウントを作成';
  hideMessages();
}

function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('authSuccess').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('authSuccess');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('authError').style.display = 'none';
}
function hideMessages() {
  document.getElementById('authError').style.display = 'none';
  document.getElementById('authSuccess').style.display = 'none';
}

async function submitAuth() {
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  if (!email || !password) { showError('メールアドレスとパスワードを入力してください'); return; }
  if (password.length < 8) { showError('パスワードは8文字以上にしてください'); return; }

  const btn = document.getElementById('authBtn');
  btn.textContent = '処理中...'; btn.disabled = true;

  if (currentTab === 'login') {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showError('メールアドレスまたはパスワードが間違っています'); btn.textContent = 'ログイン'; btn.disabled = false; }
  } else {
    const { error } = await sb.auth.signUp({ email, password });
    if (error) { showError('登録に失敗しました: ' + error.message); btn.textContent = 'アカウントを作成'; btn.disabled = false; }
    else { showSuccess('確認メールを送りました。メールのリンクをクリックしてからログインしてください。'); btn.textContent = 'アカウントを作成'; btn.disabled = false; }
  }
}

function showAuthScreen() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
}

async function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  document.getElementById('userEmail').textContent = currentUser.email;
  await loadEntries();
}

async function logout() {
  await sb.auth.signOut();
}

async function loadEntries() {
  const { data, error } = await sb.from('entries').select('*').eq('user_id', currentUser.id).order('date', { ascending: false });
  if (!error) {
    entries = data || [];
    renderTagFilterChips();
    renderList();
    if (entries.length > 0) openEntry(entries[0].id);
  }
}

async function saveEntry(e) {
  if (e._new) {
    const { data, error } = await sb.from('entries').insert({
      user_id: currentUser.id, title: e.title, body: e.body, mood: e.mood, tags: e.tags, date: e.date
    }).select().single();
    if (!error && data) {
      const idx = entries.findIndex(x => x.id === e.id);
      entries[idx] = data;
      activeId = data.id;
    }
  } else {
    await sb.from('entries').update({ title: e.title, body: e.body, mood: e.mood, tags: e.tags, date: e.date }).eq('id', e.id).eq('user_id', currentUser.id);
  }
}

async function newEntry() {
  const tempId = 'temp-' + Date.now();
  const newE = { id: tempId, _new: true, title: '', date: todayStr(), mood: null, tags: [], body: '', user_id: currentUser.id };
  entries.unshift(newE);
  renderList();
  openEntry(tempId);
  setTimeout(() => document.getElementById('titleInput').focus(), 50);
}

function openEntry(id) {
  activeId = id;
  const e = entries.find(x => x.id === id);
  if (!e) return;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('editorArea').style.display = 'flex';
  document.getElementById('editorDateDisplay').textContent = formatDate(e.date);
  document.getElementById('titleInput').value = e.title || '';
  document.getElementById('bodyInput').value = e.body || '';
  document.querySelectorAll('.mood-dot').forEach((btn, i) => {
    btn.classList.toggle('selected', ['☀️','🌿','🌙','🌧️','🔥'][i] === e.mood);
  });
  renderTags(e.tags || []);
  document.getElementById('saveIndicator').textContent = '保存済み';
  document.getElementById('saveIndicator').className = 'save-indicator saved';
  autoResize(document.getElementById('titleInput'));
  autoResize(document.getElementById('bodyInput'));
  renderList();
}

function onEdit() {
  const e = entries.find(x => x.id === activeId);
  if (!e) return;
  e.title = document.getElementById('titleInput').value;
  e.body = document.getElementById('bodyInput').value;
  document.getElementById('saveIndicator').textContent = '保存中...';
  document.getElementById('saveIndicator').className = 'save-indicator';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    await saveEntry(e);
    document.getElementById('saveIndicator').textContent = '保存済み ✓';
    document.getElementById('saveIndicator').className = 'save-indicator saved';
    renderList();
  }, 1000);
}

async function setMood(idx, emoji) {
  const e = entries.find(x => x.id === activeId);
  if (!e) return;
  e.mood = emoji;
  document.querySelectorAll('.mood-dot').forEach((btn, i) => btn.classList.toggle('selected', i === idx));
  await saveEntry(e);
  renderList();
}

function renderTags(tags) {
  const list = document.getElementById('tagList');
  list.innerHTML = '';
  (tags || []).forEach(tag => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = tag;
    span.onclick = () => removeTag(tag);
    list.appendChild(span);
  });
}

async function handleTagInput(ev) {
  if (ev.key === 'Enter' || ev.key === ',') {
    ev.preventDefault();
    const val = ev.target.value.trim();
    if (!val) return;
    const entry = entries.find(x => x.id === activeId);
    if (entry && !(entry.tags || []).includes(val)) {
      entry.tags = [...(entry.tags || []), val];
      renderTags(entry.tags);
      renderTagFilterChips();
      await saveEntry(entry);
    }
    ev.target.value = '';
  }
}

async function removeTag(tag) {
  const entry = entries.find(x => x.id === activeId);
  if (!entry) return;
  entry.tags = (entry.tags || []).filter(t => t !== tag);
  renderTags(entry.tags);
  renderTagFilterChips();
  await saveEntry(entry);
}

function getAllTags() {
  const s = new Set();
  entries.forEach(e => (e.tags || []).forEach(t => s.add(t)));
  return [...s];
}

function renderTagFilterChips() {
  const bar = document.getElementById('tagFilter');
  bar.innerHTML = '';
  getAllTags().forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (activeTagFilters.has(tag) ? ' active' : '');
    btn.textContent = tag;
    btn.onclick = () => toggleTagFilter(btn, tag);
    bar.appendChild(btn);
  });
}

function toggleMoodFilter(btn) {
  const mood = btn.dataset.mood;
  if (activeMoodFilters.has(mood)) { activeMoodFilters.delete(mood); btn.classList.remove('active'); }
  else { activeMoodFilters.add(mood); btn.classList.add('active'); }
  applyFilters();
}

function toggleTagFilter(btn, tag) {
  if (activeTagFilters.has(tag)) { activeTagFilters.delete(tag); btn.classList.remove('active'); }
  else { activeTagFilters.add(tag); btn.classList.add('active'); }
  applyFilters();
}

function getFiltered() {
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  return entries.filter(e => {
    if (q && !((e.title||'').toLowerCase().includes(q)||(e.body||'').toLowerCase().includes(q)||(e.tags||[]).some(t=>t.toLowerCase().includes(q)))) return false;
    if (activeMoodFilters.size > 0 && !activeMoodFilters.has(e.mood)) return false;
    if (from && e.date < from) return false;
    if (to && e.date > to) return false;
    if (activeTagFilters.size > 0 && !(e.tags||[]).some(t=>activeTagFilters.has(t))) return false;
    return true;
  });
}

function applyFilters() { renderList(); }

function highlight(text, query) {
  if (!query) return escHtml(text);
  return escHtml(text).replace(new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`);
}
function escHtml(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderList() {
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const filtered = getFiltered();
  const list = document.getElementById('entryList');
  list.innerHTML = '';
  document.getElementById('entriesCount').textContent = `${filtered.length}件`;
  if (filtered.length === 0) { list.innerHTML = '<div class="no-results">条件に合う記録が<br>見つかりませんでした</div>'; return; }
  filtered.forEach(e => {
    const div = document.createElement('div');
    div.className = 'entry-item' + (e.id === activeId ? ' active' : '');
    const tagsHtml = (e.tags||[]).map(t=>`<span class="entry-tag-pill">${escHtml(t)}</span>`).join('');
    div.innerHTML = `
      <div class="entry-date">${formatDate(e.date)} ${e.mood||''}</div>
      <div class="entry-title">${highlight(e.title||'無題',q)}</div>
      <div class="entry-preview">${highlight((e.body||'').replace(/\n/g,' ').slice(0,40),q)}...</div>
      ${tagsHtml?`<div class="entry-tags-row">${tagsHtml}</div>`:''}
    `;
    div.onclick = () => openEntry(e.id);
    list.appendChild(div);
  });
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d+'T00:00:00');
  return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function autoResize(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

init();
</script>
</body>
</html>
